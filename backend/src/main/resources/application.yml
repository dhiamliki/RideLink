spring:
  application:
    name: ridelink-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:ridelink}
    username: ${DB_USER:ridelink}
    password: ${DB_PASSWORD:ridelink}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: classpath:db/migration

server:
  port: 8080

auth:
  jwt:
    # HS256 signing secret. Dev default is NON-SECRET; override with JWT_SECRET in real envs.
    secret: ${JWT_SECRET:dev-secret-change-me-please-at-least-32-bytes-long-000000}
    access-ttl: PT15M
    refresh-ttl: P30D
  otp:
    ttl: PT5M
    resend-interval: PT30S
    max-attempts: 5

storage:
  # Local filesystem stub for v1; a cloud provider replaces LocalPhotoStorage later.
  upload-dir: ${UPLOAD_DIR:./uploads}
